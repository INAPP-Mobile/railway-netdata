<svg xmlns="http://www.w3.org/2000/svg" width="800" height="800" viewBox="0 0 800 800">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#4F46E5"/>
      <stop offset="100%" stop-color="#7C3AED"/>
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#00AB44"/>
      <stop offset="100%" stop-color="#00E676"/>
    </linearGradient>
  </defs>
  <!-- Background -->
  <rect width="800" height="800" rx="40" fill="url(#bg)"/>
  <!-- Grid pattern for monitoring feel -->
  <g opacity="0.08">
    <line x1="0" y1="200" x2="800" y2="200" stroke="white" stroke-width="1"/>
    <line x1="0" y1="400" x2="800" y2="400" stroke="white" stroke-width="1"/>
    <line x1="0" y1="600" x2="800" y2="600" stroke="white" stroke-width="1"/>
    <line x1="200" y1="0" x2="200" y2="800" stroke="white" stroke-width="1"/>
    <line x1="400" y1="0" x2="400" y2="800" stroke="white" stroke-width="1"/>
    <line x1="600" y1="0" x2="600" y2="800" stroke="white" stroke-width="1"/>
  </g>
  <!-- Server/monitor icon -->
  <g transform="translate(400, 350)">
    <!-- Monitor/server rack body -->
    <rect x="-120" y="-90" width="240" height="180" rx="16" fill="white" opacity="0.15"/>
    <rect x="-100" y="-70" width="200" height="140" rx="12" fill="white" opacity="0.95"/>
    <!-- Dashboard bars -->
    <g>
      <rect x="-70" y="-50" width="16" height="100" rx="4" fill="#4F46E5"/>
      <rect x="-44" y="-30" width="16" height="80" rx="4" fill="#6366F1"/>
      <rect x="-18" y="-10" width="16" height="60" rx="4" fill="#818CF8"/>
      <rect x="8" y="-40" width="16" height="90" rx="4" fill="#00AB44"/>
      <rect x="34" y="-20" width="16" height="70" rx="4" fill="#00E676"/>
      <rect x="60" y="-55" width="16" height="110" rx="4" fill="#10B981"/>
    </g>
    <!-- Trend line -->
    <polyline points="-85,30 -65,10 -45,25 -25,-15 -5,5 15,20 35,-5 55,15 75,-25 85,-10"
              fill="none" stroke="#00AB44" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/>
    <!-- Uptime indicator dot -->
    <circle cx="70" cy="-55" r="8" fill="#00E676"/>
    <circle cx="70" cy="-55" r="3" fill="white"/>
  </g>
  <!-- Label -->
  <text x="400" y="590" font-family="Arial, Helvetica, sans-serif" font-size="48" font-weight="700" fill="white" text-anchor="middle" letter-spacing="2">NETDATA</text>
  <text x="400" y="630" font-family="Arial, Helvetica, sans-serif" font-size="20" fill="white" opacity="0.7" text-anchor="middle" letter-spacing="3">REAL-TIME MONITORING</text>
</svg>
