<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0F172A"/>
      <stop offset="50%" stop-color="#1E1B4B"/>
      <stop offset="100%" stop-color="#0F172A"/>
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#4F46E5"/>
      <stop offset="100%" stop-color="#7C3AED"/>
    </linearGradient>
    <linearGradient id="green" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#00AB44"/>
      <stop offset="100%" stop-color="#00E676"/>
    </linearGradient>
  </defs>
  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bg)"/>
  <!-- Grid dots -->
  <g fill="white" opacity="0.04">
    <circle cx="50" cy="50" r="2"/><circle cx="150" cy="50" r="2"/><circle cx="250" cy="50" r="2"/><circle cx="350" cy="50" r="2"/>
    <circle cx="450" cy="50" r="2"/><circle cx="550" cy="50" r="2"/><circle cx="650" cy="50" r="2"/><circle cx="750" cy="50" r="2"/>
    <circle cx="850" cy="50" r="2"/><circle cx="950" cy="50" r="2"/><circle cx="1050" cy="50" r="2"/><circle cx="1150" cy="50" r="2"/>
    <circle cx="50" cy="150" r="2"/><circle cx="150" cy="150" r="2"/><circle cx="350" cy="150" r="2"/><circle cx="550" cy="150" r="2"/>
    <circle cx="750" cy="150" r="2"/><circle cx="950" cy="150" r="2"/><circle cx="1050" cy="150" r="2"/><circle cx="1150" cy="150" r="2"/>
    <circle cx="50" cy="250" r="2"/><circle cx="250" cy="250" r="2"/><circle cx="450" cy="250" r="2"/><circle cx="650" cy="250" r="2"/>
    <circle cx="850" cy="250" r="2"/><circle cx="1050" cy="250" r="2"/><circle cx="50" cy="350" r="2"/><circle cx="150" cy="350" r="2"/>
    <circle cx="350" cy="350" r="2"/><circle cx="550" cy="350" r="2"/><circle cx="750" cy="350" r="2"/><circle cx="950" cy="350" r="2"/>
    <circle cx="1150" cy="350" r="2"/><circle cx="50" cy="450" r="2"/><circle cx="250" cy="450" r="2"/><circle cx="450" cy="450" r="2"/>
    <circle cx="650" cy="450" r="2"/><circle cx="850" cy="450" r="2"/><circle cx="1050" cy="450" r="2"/><circle cx="50" cy="550" r="2"/>
    <circle cx="150" cy="550" r="2"/><circle cx="350" cy="550" r="2"/><circle cx="550" cy="550" r="2"/><circle cx="750" cy="550" r="2"/>
    <circle cx="950" cy="550" r="2"/><circle cx="1150" cy="550" r="2"/>
  </g>
  <!-- Decorative line chart -->
  <g opacity="0.15">
    <polyline points="50,480 120,420 200,450 280,380 360,400 440,340 520,360 600,280 680,300 760,240 840,260 920,200 1000,220 1080,160 1150,180"
              fill="none" stroke="#00E676" stroke-width="2"/>
    <polyline points="50,500 120,460 200,470 280,420 360,440 440,380 520,400 600,320 680,340 760,280 840,300 920,250 1000,270 1080,220 1150,230"
              fill="none" stroke="#4F46E5" stroke-width="2"/>
    <polyline points="50,520 120,500 200,510 280,470 360,480 440,440 520,450 600,400 680,410 760,360 840,380 920,330 1000,350 1080,300 1150,310"
              fill="none" stroke="#7C3AED" stroke-width="2"/>
  </g>
  <!-- Dashboard bar visualization -->
  <g transform="translate(100, 200)" opacity="0.25">
    <rect x="0" y="0" width="20" height="120" rx="4" fill="#4F46E5"/>
    <rect x="26" y="30" width="20" height="90" rx="4" fill="#6366F1"/>
    <rect x="52" y="10" width="20" height="110" rx="4" fill="#818CF8"/>
    <rect x="78" y="50" width="20" height="70" rx="4" fill="#00AB44"/>
    <rect x="104" y="20" width="20" height="100" rx="4" fill="#00E676"/>
    <rect x="130" y="60" width="20" height="60" rx="4" fill="#10B981"/>
    <rect x="156" y="0" width="20" height="120" rx="4" fill="#34D399"/>
    <rect x="182" y="40" width="20" height="80" rx="4" fill="#4F46E5"/>
  </g>
  <!-- Main content area -->
  <g transform="translate(600, 315)">
    <!-- Logo badge -->
    <rect x="-80" y="-140" width="160" height="160" rx="32" fill="url(#accent)"/>
    <!-- Dashboard inside logo -->
    <rect x="-45" y="-105" width="14" height="90" rx="4" fill="white" opacity="0.9"/>
    <rect x="-24" y="-85" width="14" height="70" rx="4" fill="white" opacity="0.8"/>
    <rect x="-3" y="-65" width="14" height="50" rx="4" fill="white" opacity="0.6"/>
    <rect x="18" y="-95" width="14" height="80" rx="4" fill="#00E676"/>
    <rect x="39" y="-75" width="14" height="60" rx="4" fill="#00AB44"/>
    <!-- Title -->
    <text x="0" y="60" font-family="Arial, Helvetica, sans-serif" font-size="56" font-weight="800" fill="white" text-anchor="middle" letter-spacing="4">NETDATA</text>
    <text x="0" y="100" font-family="Arial, Helvetica, sans-serif" font-size="22" fill="rgba(255,255,255,0.7)" text-anchor="middle" letter-spacing="4">REAL-TIME INFRASTRUCTURE MONITORING</text>
  </g>
  <!-- Deploy on Railway badge -->
  <g transform="translate(600, 560)">
    <rect x="-120" y="-24" width="240" height="48" rx="24" fill="#0B1120" stroke="#1E293B" stroke-width="2"/>
    <text x="0" y="8" font-family="Arial, Helvetica, sans-serif" font-size="20" font-weight="700" fill="white" text-anchor="middle">Deploy on Railway</text>
  </g>
  <!-- Tag labels -->
  <g transform="translate(600, 610)">
    <rect x="-200" y="-14" width="90" height="28" rx="14" fill="rgba(79,70,229,0.3)"/>
    <text x="-155" y="6" font-family="Arial, Helvetica, sans-serif" font-size="13" fill="#A5B4FC" text-anchor="middle">Monitoring</text>
    <rect x="-100" y="-14" width="80" height="28" rx="14" fill="rgba(0,171,68,0.3)"/>
    <text x="-60" y="6" font-family="Arial, Helvetica, sans-serif" font-size="13" fill="#6EE7B7" text-anchor="middle">DevOps</text>
    <rect x="-10" y="-14" width="70" height="28" rx="14" fill="rgba(124,58,237,0.3)"/>
    <text x="25" y="6" font-family="Arial, Helvetica, sans-serif" font-size="13" fill="#DDD6FE" text-anchor="middle">Open Source</text>
    <rect x="70" y="-14" width="130" height="28" rx="14" fill="rgba(16,185,129,0.3)"/>
    <text x="135" y="6" font-family="Arial, Helvetica, sans-serif" font-size="13" fill="#A7F3D0" text-anchor="middle">One-Click Deploy</text>
  </g>
</svg>
